    <meta charset="UTF-8">

```
<title>Hệ thống điểm danh RFID</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet">

<style>

    body{
        background:#f5f7ff;
    }

    /* HEADER */

    .header{
        background:#0C2B7A;
        color:white;
        text-align:center;
        padding:20px;
        border-radius:12px;
        margin-bottom:20px;
    }

    .header h3{
        color:#FFCD00;
        font-weight:bold;
        margin-top:10px;
    }

    .logo{
        width:90px;
        margin-bottom:10px;
    }

    /* TAB */

    .nav-tabs .nav-link.active{
        background:#FFCD00;
        color:#0C2B7A;
        font-weight:bold;
    }

    /* FORM */

    .form-control{
        border:2px solid #0C2B7A;
    }

    .form-control:focus{
        border-color:#0C2B7A;
        box-shadow:0 0 5px rgba(12,43,122,0.4);
    }

    /* BUTTON */

    .btn-add{
        background:#0C2B7A;
        color:white;
        border:none;
    }

    .btn-add:hover{
        background:#081f59;
        color:white;
    }

    .btn-delete-student{
        background:#FFCD00;
        color:#0C2B7A;
        border:none;
        font-weight:bold;
    }

    .btn-delete-student:hover{
        background:#e6b800;
        color:#0C2B7A;
    }

    /* TABLE */

    .table th{
        text-align:center;
        vertical-align:middle;
    }

    .table td{
        vertical-align:middle;
    }

</style>
```

</head>

<body>

<div class="container mt-4">

```
<!-- HEADER -->

<div class="header">

    <img src="/logo.png"
         alt="Logo"
         class="logo">

    <h5>
        TRƯỜNG ĐẠI HỌC GIAO THÔNG VẬN TẢI
    </h5>

    <h6>
        PHÂN HIỆU THÀNH PHỐ HỒ CHÍ MINH
    </h6>

    <h3>
        HỆ THỐNG ĐIỂM DANH RFID
    </h3>

</div>

<!-- TAB MENU -->

<ul class="nav nav-tabs">

    <li class="nav-item">
        <button class="nav-link active"
                data-bs-toggle="tab"
                data-bs-target="#attendance">
            Quản lý điểm danh
        </button>
    </li>

    <li class="nav-item">
        <button class="nav-link"
                data-bs-toggle="tab"
                data-bs-target="#admin">
            Quản trị hệ thống
        </button>
    </li>

</ul>

<!-- TAB CONTENT -->

<div class="tab-content mt-3">

    <!-- TAB ĐIỂM DANH -->

    <div class="tab-pane fade show active"
         id="attendance">

        <div id="msg"
             class="alert alert-info">
            Chờ quét thẻ RFID...
        </div>

        <table class="table table-bordered table-striped">

            <thead class="table-dark">

            <tr>
                <th>UID</th>
                <th>MSSV</th>
                <th>Họ tên</th>
                <th>Lớp</th>
                <th>Ngày</th>
                <th>Giờ vào</th>
                <th>Giờ ra</th>
                <th>Xóa</th>
            </tr>

            </thead>

            <tbody id="body">
            </tbody>

        </table>

        <a href="/export"
           class="btn btn-warning w-100">

            📥 Xuất danh sách Excel

        </a>

    </div>

    <!-- TAB ADMIN -->

    <div class="tab-pane fade"
         id="admin">

        <div class="card p-3">

            <h5 class="mb-3">
                Quản lý sinh viên
            </h5>

            <input type="text"
                   id="uid"
                   class="form-control mb-2"
                   placeholder="UID thẻ RFID">

            <input type="text"
                   id="mssv"
                   class="form-control mb-2"
                   placeholder="Mã số sinh viên">

            <input type="text"
                   id="name"
                   class="form-control mb-2"
                   placeholder="Họ và tên">

            <input type="text"
                   id="class"
                   class="form-control mb-3"
                   placeholder="Lớp">

            <button class="btn btn-add w-100"
                    onclick="addStudent()">

                ➕ Thêm sinh viên

            </button>

            <button class="btn btn-delete-student w-100 mt-2"
                    onclick="deleteStudent()">

                🗑️ Xóa sinh viên

            </button>

            <p id="msg2"
               class="mt-3 fw-bold">
            </p>

        </div>

    </div>

</div>
```

</div>

<script src="{{ url_for('static', filename='app.js') }}"></script>

</body>
</html>
